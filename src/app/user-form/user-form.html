<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ userId ? 'Edit User' : 'Add User' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button type="button" [routerLink]="['/users']">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid">
            Save
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
