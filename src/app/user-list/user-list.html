<div class="container">
  <div class="header">
    <h1>Users</h1>
    <button mat-raised-button color="primary" [routerLink]="['/user/new']">Add User</button>
  </div>

  @if (loading()) {
    <div class="spinner-container">
      <mat-spinner></mat-spinner>
    </div>
  } @else {
    <div class="user-list">
      @for (user of users(); track user.id) {
        <div class="user-card">
          <div class="user-info">
            <div class="user-name">{{ user.name }}</div>
            <div class="user-email">{{ user.email }}</div>
          </div>
          <div class="user-actions">
            <button mat-icon-button color="primary" [routerLink]="['/user', user.id, 'edit']">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteUser(user.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </div>
      } @empty {
        <div class="empty-state">
          <p>No users found. Add a new one!</p>
        </div>
      }
    </div>
  }
</div>
